services:
  - type: web
    name: rony-live-signals
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: INGEST_TOKEN
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /var/data/live_signals.db
    disk:
      name: live-signals-data
      mountPath: /var/data
      sizeGB: 1
