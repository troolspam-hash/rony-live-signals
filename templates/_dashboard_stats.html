<section class="stats-grid" data-refresh-block="stats">
  <div class="stat">
    <span class="stat-icon"><img src="https://cdn-icons-png.magnific.com/512/18/18383.png" alt="Trades"></span>
    <div>
      <span>Trades</span>
      <strong>{{ trade_stats.total }}</strong>
      <small>fechados no historico</small>
    </div>
  </div>
  <div class="stat">
    <span class="stat-icon"><img src="https://cdn-icons-png.flaticon.com/512/934/934640.png" alt="Win Rate"></span>
    <div>
      <span>Win Rate</span>
      <strong>{% if trade_stats.wr is not none %}{{ "%.1f"|format(trade_stats.wr) }}%{% else %}--{% endif %}</strong>
      <small>{{ trade_stats.wins }}/{{ trade_stats.losses }} green / loss</small>
    </div>
  </div>
  <div class="stat">
    <span class="stat-icon"><img src="https://static.vecteezy.com/system/resources/previews/014/455/897/non_2x/money-icon-on-transparent-background-free-png.png" alt="PnL"></span>
    <div>
      <span>PnL %</span>
      <strong class="{% if trade_stats.pnl_pct >= 0 %}up{% else %}down{% endif %}">
        {{ "%+.2f"|format(trade_stats.pnl_pct) }}%
      </strong>
      <small>acumulado finalizado</small>
    </div>
  </div>
</section>
