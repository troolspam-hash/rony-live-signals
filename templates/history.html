{% extends "base.html" %}
{% block content %}
<section class="panel history-board">
  <div class="panel-head history-head">
    <div class="history-title">
      <span class="history-icon">&#8634;</span>
      <h1>Historico</h1>
    </div>
    <form class="filters" method="get">
      <select name="asset">
        <option value="all">Todos ativos</option>
        {% for row in assets %}
          <option value="{{ row.asset }}" {% if asset == row.asset %}selected{% endif %}>{{ row.asset }}</option>
        {% endfor %}
      </select>
      <select name="direction">
        <option value="all">Todas direcoes</option>
        <option value="long" {% if direction == 'long' %}selected{% endif %}>Long</option>
        <option value="short" {% if direction == 'short' %}selected{% endif %}>Short</option>
      </select>
      <select name="result">
        <option value="all">Todos resultados</option>
        <option value="tp" {% if result == 'tp' %}selected{% endif %}>Take Profit</option>
        <option value="sl" {% if result == 'sl' %}selected{% endif %}>Stop Loss</option>
      </select>
      <input type="hidden" name="per_page" value="{{ per_page }}">
      <button type="submit">Filtrar</button>
    </form>
  </div>

  {% include "_history_table.html" %}
</section>
{% endblock %}
